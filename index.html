<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting… — magicthegathering.com.au</title>
  <meta name="robots" content="noindex">

  <!-- No-JS fallback: fires at 6s only if the JS redirect (4s) didn't already happen -->
  <noscript>
    <meta http-equiv="refresh" content="6;url=https://magicthegathering.com">
  </noscript>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XHTJXRNJMZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XHTJXRNJMZ');
  </script>

  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #59636e;
      --accent: #9a6a00;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #eef1f5 0%, var(--bg) 60%);
      color: var(--text);
      text-align: center;
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 32px;
      box-shadow: 0 12px 40px rgba(31,35,40,0.12);
    }
    h1 {
      font-size: 1.35rem;
      line-height: 1.35;
      margin: 0 0 12px;
      font-weight: 650;
    }
    p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
      margin: 0 0 20px;
    }
    .count {
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    a.go {
      display: inline-block;
      margin-top: 4px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid transparent;
    }
    a.go:hover { border-bottom-color: var(--accent); }
    .domain { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>
  <main class="card">
    <h1>You've reached <span class="domain">magicthegathering.com.au</span></h1>
    <p>
      Sending you to
      <span class="domain">magicthegathering.com</span> in
      <span class="count" id="count">4</span> seconds…
    </p>
    <a class="go" id="go" href="https://magicthegathering.com">Click here if you're not redirected →</a>
  </main>

  <script>
    (function () {
      var DEST = 'https://magicthegathering.com';
      var SECONDS = 4;
      var redirected = false;

      var countEl = document.getElementById('count');
      var goEl = document.getElementById('go');

      function go() {
        if (redirected) return;
        redirected = true;
        window.location.replace(DEST);
      }

      // Let people leave early via the link.
      goEl.addEventListener('click', function () { redirected = true; });

      // Countdown display.
      var remaining = SECONDS;
      var timer = setInterval(function () {
        remaining -= 1;
        if (remaining < 0) remaining = 0;
        countEl.textContent = remaining;
        if (remaining === 0) clearInterval(timer);
      }, 1000);

      // At the end of the countdown, log a distinct event, then redirect.
      // transport_type 'beacon' makes the hit survive the navigation.
      setTimeout(function () {
        var safety = setTimeout(go, 700); // fire even if the callback never comes
        gtag('event', 'redirect', {
          destination: DEST,
          transport_type: 'beacon',
          event_callback: function () { clearTimeout(safety); go(); }
        });
      }, SECONDS * 1000);
    })();
  </script>
</body>
</html>
